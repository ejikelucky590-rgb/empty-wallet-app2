<!DOCTYPE html>
<html>
<head>
  <base href="/empty-wallet-app2/">
  <meta charset="UTF-8">
  <title>Dove Music</title>
  <style>
    body { margin: 0; background-color: #000000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    #loading-wrapper { 
      text-align: center; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      transition: opacity 0.5s ease-out;
    }
    .logo { font-size: 80px; margin-bottom: 20px; }
    .brand-name { color: white; font-family: sans-serif; font-size: 24px; letter-spacing: 5px; font-weight: bold; margin-bottom: 30px; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #25F4EE; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading-wrapper">
    <div class="logo">🕊️</div>
    <div class="brand-name">DOVE MUSIC</div>
    <div class="spinner"></div>
  </div>
  <script>
    window.addEventListener('load', function() {
      // Small delay to ensure Flutter is ready
      setTimeout(function() {
        var loader = document.getElementById('loading-wrapper');
        if (loader) { loader.style.opacity = '0'; }
      }, 1000);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
